# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
# IMPORTANT: Paste your actual secret values in the `value` fields below.
# For a production app, it is strongly recommended to use Secret Manager
# (which requires a billing account) instead of hardcoding secrets.
# We are using apphosting.yaml for this simulation to avoid billing requirements.
env:
  - variable: GOOGLE_CLIENT_ID
    value: "PASTE_YOUR_GOOGLE_CLIENT_ID_HERE"
  - variable: GOOGLE_CLIENT_SECRET
    value: "PASTE_YOUR_GOOGLE_CLIENT_SECRET_HERE"
  - variable: NEXTAUTH_SECRET
    value: "PASTE_YOUR_NEXTAUTH_SECRET_HERE"
