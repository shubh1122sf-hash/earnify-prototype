<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Firebase Auth Handler</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>
  <script>
    const firebaseConfig = {
      "projectId": "earnify-simulator",
      "appId": "1:175164373016:web:5344960ccd36dc98d4eb6d",
      "storageBucket": "earnify-simulator.firebasestorage.app",
      "apiKey": "AIzaSyCbMlgngCxOgTY8Qf-lnb4sIUD0-0gut0c",
      "authDomain": "earnify-simulator.firebaseapp.com",
      "messagingSenderId": "175164373016"
    };

    firebase.initializeApp(firebaseConfig);

    firebase.auth().getRedirectResult().then(function(result) {
      // On success, the main app's onAuthStateChanged listener will handle the user.
      // We just need to close this window.
      window.close();
    }).catch(function(error) {
      // Handle Errors here.
      console.error("Auth handler error:", error);
      // You could display an error message to the user here.
      document.body.innerHTML = "<h1>Error signing in</h1><p>" + error.message + "</p>";
    });
  </script>
</body>
</html>
